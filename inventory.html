<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>보유 렌즈 추천</title>
<style>
:root{font-family:"Segoe UI","Noto Sans KR",Arial,sans-serif;color:#14222d;background:#edf3f5}*{box-sizing:border-box}body{margin:0}header{background:#fff;border-bottom:1px solid #d8e1e7;padding:18px 24px}h1{margin:2px 0 0;font-size:28px}.eyebrow{margin:0;color:#0f766e;font-weight:700;font-size:13px}.wrap{display:grid;grid-template-columns:minmax(0,1fr)340px;gap:16px;padding:16px}.panel{background:#fff;border:1px solid #d8e1e7;border-radius:8px;padding:18px;margin-bottom:16px}h2{margin:0 0 12px;font-size:18px}.grid{display:grid;grid-template-columns:repeat(4,minmax(130px,1fr));gap:12px}label{display:grid;gap:6px;font-size:13px;font-weight:700}input,select,textarea,button{font:inherit}input,select,textarea{border:1px solid #d8e1e7;border-radius:6px;padding:10px;min-height:40px;width:100%}textarea{min-height:150px;resize:vertical}button{border:0;border-radius:6px;background:#0f766e;color:#fff;padding:10px 14px;min-height:40px;cursor:pointer}.ghost{background:#edf2f4;color:#14222d;border:1px solid #d8e1e7}.row{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}.result{background:#e9f2f7;border:1px solid #c8ddea;border-radius:8px;padding:14px}.soft{background:#eaf6f2;border-color:#c6e5d8}.badge{display:inline-flex;padding:4px 8px;border-radius:999px;background:#fff6e8;border:1px solid #f3d49d;font-size:12px;font-weight:700;margin:0 6px 6px 0}.table{overflow:auto;border:1px solid #d8e1e7;border-radius:8px;background:#fff;margin-top:10px}table{border-collapse:collapse;width:100%;font-size:13px}th,td{border-bottom:1px solid #d8e1e7;padding:8px;text-align:left;white-space:nowrap}th{background:#f2f6f7}.muted{color:#64717f;font-size:14px}.card{background:#f7fafb;border:1px solid #d8e1e7;border-radius:6px;padding:10px;margin-bottom:8px}.card span{display:block;color:#64717f;font-size:12px;font-weight:700}.card strong{display:block;margin-top:3px}@media(max-width:900px){.wrap{grid-template-columns:1fr}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><p class="eyebrow">Yonsei Sol Eye Clinic</p><h1>보유 렌즈 기반 추천</h1></header>
<main class="wrap"><section>
<section class="panel"><h2>환자 계산값</h2><div class="grid"><label>렌즈군<select id="family"><option value="ok">드림렌즈/OK</option><option value="lk">LK</option><option value="crt">Paragon CRT</option><option value="rgp">RGP</option></select></label><label>Flat K(D)<input id="flatK" type="number" step="0.01" value="43.20"></label><label>Steep K(D)<input id="steepK" type="number" step="0.01" value="44.80"></label><label>Sph<input id="sphere" type="number" step="0.25" value="-4.75"></label><label>Cyl<input id="cylinder" type="number" step="0.25" value="-0.75"></label><label>Ecc<input id="ecc" type="number" step="0.01" value="0.68"></label><label>HVID(mm)<input id="hvid" type="number" step="0.1" value="11.1"></label><label>선호 모델<input id="model" placeholder="Premier, CH2, CRT 등"></label></div><div class="row"><button id="calcBtn">추천 계산</button><button class="ghost" id="sampleBtn">예시값</button></div><div id="theory" class="result"></div></section>
<section class="panel"><h2>재고표 등록</h2><p class="muted">Google Sheet 범위를 복사해서 붙여넣거나 CSV/TSV를 넣으세요. 헤더는 Lens, Model, FK, Power, Dia, Cyl, Qty처럼 쓰면 자동 인식합니다.</p><textarea id="inventoryText" placeholder="Lens	Model	FK	Power	Dia	Cyl	Qty&#10;LK	Premier	43.50	-5.50	10.2	0	1"></textarea><div class="row"><button id="saveBtn">재고 저장</button><button class="ghost" id="clearBtn">재고 지우기</button></div><div id="status" class="muted"></div><div id="preview" class="table"></div></section>
<section class="panel"><h2>보유 렌즈 추천 순위</h2><div id="matches" class="result soft"></div></section>
</section><aside><section class="panel"><h2>요약</h2><div id="summary"></div><p class="muted">Final FK가 43.45D처럼 계산되어도 실제 렌즈 step에 맞춰 43.50D 등으로 반올림한 뒤 재고표에서 가장 가까운 후보를 고릅니다.</p></section></aside></main>
<script>
const $=id=>document.getElementById(id),n=id=>Number($(id).value)||0,fmt=(v,d=2)=>Number.isFinite(v)?v.toFixed(d):'-',signed=v=>v>0?'+'+fmt(v):fmt(v),round=(v,s=.25)=>Math.round(v/s)*s;let inventory=[];
function norm(s){return String(s||'').toLowerCase().replace(/\s+/g,'')}function num(v){const m=String(v??'').replace(',','.').match(/-?\d+(?:\.\d+)?/);return m?+m[0]:null}
function parseTable(text){const lines=text.trim().split(/\r?\n/).filter(Boolean);if(!lines.length)return[];const delim=lines[0].includes('\t')?'\t':lines[0].includes(',')?',':/ {2,}/;const rows=lines.map(l=>l.split(delim).map(x=>x.trim()));const head=rows.shift().map(norm);const find=names=>head.findIndex(h=>names.some(n=>h.includes(n)));const ix={lens:find(['lens','렌즈','종류']),model:find(['model','모델','design','디자인']),fk:find(['fk','flatk','ack','a.c','ac','k']),power:find(['power','dptr','sph','tp','target','도수']),dia:find(['dia','oad','diameter','직경']),cyl:find(['cyl','cylinder','난시']),bc:find(['bc','base']),rzd:find(['rzd']),lza:find(['lza']),qty:find(['qty','stock','수량','재고'])};return rows.map((r,i)=>({id:i+1,lens:r[ix.lens]||'',model:r[ix.model]||'',fk:num(r[ix.fk]),power:num(r[ix.power]),dia:num(r[ix.dia]),cyl:num(r[ix.cyl])||0,bc:num(r[ix.bc]),rzd:num(r[ix.rzd]),lza:num(r[ix.lza]),qty:ix.qty>=0?(num(r[ix.qty])??1):1,raw:r})).filter(x=>x.qty!==0&&(x.fk!=null||x.power!=null||x.bc!=null))}
function plan(){const flat=n('flatK'),steep=n('steepK'),cylK=Math.max(0,steep-flat);let rawFK=cylK<=.75?flat-.25:cylK<=1.5?flat:cylK<=2.25?flat+.25:cylK<=3?flat+.5:flat+.75;let fk=round(rawFK,.25);let tp=round(n('sphere')+Math.min(n('cylinder'),0),.25);let dia=n('hvid')<=11.2?10.2:n('hvid')<=11.5?10.6:11.0;if($('family').value==='lk'){const e=n('ecc');let shift=e<.40?-.625:e<.46?-.125:e<=.54?0:e<=.60?.375:e<=.65?.625:.875;fk=round(flat+shift,.25);tp=-round(Math.abs(n('sphere'))+(flat<42.5||e>.6?1:.75),.25)}return{flat,steep,cylK,rawFK,fk,tp,dia,model:$('model').value,family:$('family').value,cyl:Math.abs(n('cylinder'))}}
function match(p){const rows=inventory.filter(r=>{const s=norm([r.lens,r.model].join(' '));if(p.family==='crt')return s.includes('crt')||r.rzd!=null||r.lza!=null;if(p.family==='lk')return s.includes('lk')||s.includes('premier')||s.includes('ch2');if(p.family==='rgp')return s.includes('rgp')||s.includes('supervision')||s.includes('envision')||s.includes('thinsite');return !s.includes('scleral')&&!s.includes('rgp')});return rows.map(r=>{let score=0,why=[];if(r.fk!=null){let d=Math.abs(r.fk-p.fk);score+=d*8;why.push(`FK ${fmt(r.fk)} (${fmt(d)}D 차이)`)}if(r.power!=null){let d=Math.abs(r.power-p.tp);score+=d*5;why.push(`Power ${signed(r.power)} (${fmt(d)}D 차이)`)}if(r.dia!=null){let d=Math.abs(r.dia-p.dia);score+=d*3;why.push(`Dia ${fmt(r.dia,1)}`)}if(r.cyl!=null)score+=Math.abs(Math.abs(r.cyl)-p.cyl)*2;if(p.model&&norm(r.model+r.lens).includes(norm(p.model)))score-=1;return{...r,score,why:why.join(', ')}}).sort((a,b)=>a.score-b.score).slice(0,8)}
function table(rows){if(!rows.length)return'<p>재고표를 저장하면 추천 순위가 표시됩니다.</p>';return'<div class="table"><table><thead><tr><th>순위</th><th>Lens</th><th>Model</th><th>FK/A.C</th><th>Power</th><th>Dia</th><th>Cyl</th><th>Qty</th><th>근거</th></tr></thead><tbody>'+rows.map((r,i)=>`<tr><td>${i+1}</td><td>${r.lens||'-'}</td><td>${r.model||'-'}</td><td>${r.fk??'-'}</td><td>${r.power??'-'}</td><td>${r.dia??'-'}</td><td>${r.cyl??'-'}</td><td>${r.qty}</td><td>${r.why||'-'}</td></tr>`).join('')+'</tbody></table></div>'}
function render(){const p=plan(),m=match(p);$('theory').innerHTML=`<span class="badge">Final FK ${fmt(p.rawFK)} → ${fmt(p.fk)}D</span><span class="badge">Target Power ${signed(p.tp)}D</span><span class="badge">Dia ${fmt(p.dia,1)}mm</span><p>0.25D step 기준으로 반올림한 뒤 재고 후보를 점수화합니다.</p>`;$('matches').innerHTML=table(m);$('summary').innerHTML=`<div class="card"><span>K</span><strong>${fmt(p.flat)} / ${fmt(p.steep)} D, Δ ${fmt(p.cylK)}D</strong></div><div class="card"><span>추천 기준</span><strong>FK ${fmt(p.fk)}D, Power ${signed(p.tp)}D, Dia ${fmt(p.dia,1)}mm</strong></div><div class="card"><span>재고</span><strong>${inventory.length}개 등록</strong></div>`;preview()}
function preview(){const rows=inventory.slice(0,20);$('preview').innerHTML=rows.length?'<table><thead><tr><th>Lens</th><th>Model</th><th>FK</th><th>Power</th><th>Dia</th><th>Qty</th></tr></thead><tbody>'+rows.map(r=>`<tr><td>${r.lens}</td><td>${r.model}</td><td>${r.fk??''}</td><td>${r.power??''}</td><td>${r.dia??''}</td><td>${r.qty}</td></tr>`).join('')+'</tbody></table>':''}
function load(){inventory=JSON.parse(localStorage.getItem('lensInventory')||'[]');$('inventoryText').value=localStorage.getItem('lensInventoryText')||''}
$('saveBtn').onclick=()=>{inventory=parseTable($('inventoryText').value);localStorage.setItem('lensInventory',JSON.stringify(inventory));localStorage.setItem('lensInventoryText',$('inventoryText').value);$('status').textContent=`재고 ${inventory.length}개를 저장했습니다.`;render()};$('clearBtn').onclick=()=>{inventory=[];localStorage.removeItem('lensInventory');localStorage.removeItem('lensInventoryText');$('inventoryText').value='';render()};$('calcBtn').onclick=render;$('sampleBtn').onclick=()=>{$('flatK').value=43.2;$('steepK').value=44.8;$('sphere').value=-4.75;$('cylinder').value=-.75;$('ecc').value=.68;$('hvid').value=11.1;render()};document.querySelectorAll('input,select,textarea').forEach(e=>e.addEventListener('input',render));load();render();
</script>
</body></html>
